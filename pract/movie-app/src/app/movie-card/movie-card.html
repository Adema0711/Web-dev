<div class="card"
     [class.watched]="movie.isWatched"
     [class.not-watched]="!movie.isWatched">

  <h2>{{ movie.title }}</h2>
  <p>Year: {{ movie.year }}</p>
  <p>Votes:  {{ movie.votes }}</p>

  @if (movie.isWatched) {
    <span class="watched-badge">Watched </span>
  } @else {
    <span class="not-watched-badge">Not Watched</span>
  }
  <div class="button">
    <button class="vote-btn" (click)="vote()">Vote</button>
    <button class="remove"(click)="remove()">Removw</button>
  </div>


</div>
