<h2>Album Photos</h2>

<div *ngIf="loading">Loading photos...</div>

<div class="grid" *ngIf="!loading && photos.length > 0">

  <div class="photo-card" *ngFor="let photo of photos">
    <img [src]="photo.thumbnailUrl">
    <p>{{ photo.title }}</p>
  </div>

</div>

<br>

<a [routerLink]="['/albums', albumId]">Back</a>
