<h1>Albums</h1>

<div *ngIf="loading">Loading albums...</div>

<div *ngIf="!loading && albums.length === 0">
  No albums available.
</div>

<div class="album-card" *ngFor="let album of albums">
  
  <a [routerLink]="['/albums', album.id]" class="title">
    {{ album.id }} - {{ album.title }}
  </a>

  <button (click)="delete(album.id)" class="delete-btn">
    Delete
  </button>

</div>
